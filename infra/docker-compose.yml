# Dokploy deployment configuration.
# Copy infra/.env.example to infra/.env and fill in values before deploying.
# In Dokploy: create a Compose app, set the compose file to infra/docker-compose.yml,
# and expose only the api service (port 8000) to the public internet.
services:
  api:
    build:
      context: ..
      dockerfile: infra/dockerfiles/api.Dockerfile
    ports:
      - "${API_PORT:-8000}:8000"
    expose:
      - "8003"
    environment:
      PORT: "8000"
    env_file:
      - path: .env
        required: false
    depends_on:
      ingestion:
        condition: service_healthy
      qdrant:
        condition: service_started
      redis:
        condition: service_healthy
      reranker:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/_stcore/health', timeout=3).read()\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  ingestion:
    build:
      context: ..
      dockerfile: infra/dockerfiles/ingestion.Dockerfile
    env_file:
      - path: .env
        required: false
    expose:
      - "8002"
    depends_on:
      - qdrant
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8002/health', timeout=3).read()\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  reranker:
    build:
      context: ..
      dockerfile: infra/dockerfiles/reranker.Dockerfile
    env_file:
      - path: .env
        required: false
    expose:
      - "8001"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; req=urllib.request.Request('http://127.0.0.1:8001/health', method='POST'); urllib.request.urlopen(req, timeout=3).read()\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  qdrant_data:
  redis_data: