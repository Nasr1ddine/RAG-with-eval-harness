# Dokploy deployment configuration.
# Copy infra/.env.example to infra/.env and fill in values before deploying.
# In Dokploy: create a Compose app, set the compose file to infra/docker-compose.yml,
# and expose only the api service (port 8000) to the public internet.

services:
  api:
    build:
      context: ..
      dockerfile: infra/dockerfiles/api.Dockerfile
    ports:
      - "${API_PORT:-8000}:8000"
    env_file:
      - path: .env
        required: false
    depends_on:
      - ingestion
      - qdrant
      - redis
      - reranker
    restart: unless-stopped

  ingestion:
    build:
      context: ..
      dockerfile: infra/dockerfiles/ingestion.Dockerfile
    env_file:
      - path: .env
        required: false
    depends_on:
      - qdrant
    restart: unless-stopped

  reranker:
    build:
      context: ..
      dockerfile: infra/dockerfiles/reranker.Dockerfile
    ports:
      - "${RERANKER_PORT:-8001}:8001"
    env_file:
      - path: .env
        required: false
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "${QDRANT_PORT:-6333}:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  qdrant_data:
  redis_data:
