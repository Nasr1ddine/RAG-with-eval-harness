<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RAG System</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <header>
      <h1>RAG System</h1>
      <p class="subtitle">Upload documents and ask questions grounded in your content.</p>
      <a class="api-link" href="/docs" target="_blank" rel="noopener">API docs</a>
    </header>

    <main>
      <section class="panel settings">
        <label for="tenant-id">Tenant ID</label>
        <input id="tenant-id" type="text" value="default" autocomplete="off" />
      </section>

      <section class="panel upload">
        <h2>Upload document</h2>
        <p class="hint">Supported: PDF, DOCX, TXT, MD</p>
        <div class="upload-row">
          <input id="file-input" type="file" accept=".pdf,.docx,.txt,.md" />
          <button id="upload-btn" type="button">Upload</button>
        </div>
        <div id="upload-status" class="status" hidden></div>
      </section>

      <section class="panel chat">
        <h2>Ask a question</h2>
        <div id="messages" class="messages"></div>
        <form id="query-form" class="query-form">
          <textarea
            id="query-input"
            rows="3"
            placeholder="Ask something about your uploaded documents..."
            required
          ></textarea>
          <button type="submit" id="query-btn">Send</button>
        </form>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
